services:
  rag:
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./services/rag/data:/app/data
      - ./services/rag/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  rag-worker:
    build:
      context: ./services/rag
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./services/rag/data:/app/data
      - ./services/rag/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - worker
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
