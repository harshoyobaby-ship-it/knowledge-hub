services:
  - type: web
    name: kharesiya-rag
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: LLM_PROVIDER
        value: groq
      - key: VECTOR_STORE
        value: local
      - key: USE_CELERY
        value: false
      - key: LOCAL_DEV
        value: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PINECONE_API_KEY
        sync: false
